<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- D: Feedback Ring — closed-loop control symbol with inner signal -->
  <rect width="48" height="48" rx="10" fill="#0f172a"/>

  <!-- Outer feedback ring (gold, open arc with arrowhead) -->
  <path d="M 24,7 A 17,17 0 1 1 9.5,34" stroke="#c8a870" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Arrowhead at ring end -->
  <polyline points="7,30 9.5,34 13.5,32" stroke="#c8a870" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Inner step response (teal) -->
  <path d="M 13,26 L 15,26 C 16,26 17,15 20,15 C 22,15 23,22 25,21 C 27,20 28,17 30,17.5 C 32,18 33,19 35,19"
        stroke="#0d9488" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="2" fill="#c8a870" opacity="0.8"/>
</svg>
