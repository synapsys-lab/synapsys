<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- A: Golden Step Response — palette upgrade of current logo -->
  <rect width="48" height="48" rx="10" fill="#0f172a"/>

  <!-- Y axis -->
  <line x1="9" y1="5" x2="9" y2="41" stroke="#c8a870" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <polyline points="7,7 9,5 11,7" stroke="#c8a870" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- X axis -->
  <line x1="9" y1="41" x2="44" y2="41" stroke="#c8a870" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <polyline points="42,39 44,41 42,43" stroke="#c8a870" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Setpoint reference (dashed, teal) -->
  <line x1="9" y1="17" x2="44" y2="17" stroke="#0d9488" stroke-width="1.8" stroke-dasharray="2.5,2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Step response curve (gold) -->
  <path d="M 9,41 L 12,41 C 13,41 14,7 20,7 C 24,7 25,24 28,22 C 31,20 32,14 35,15 C 38,16 40,17 44,17"
        stroke="#c8a870" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
