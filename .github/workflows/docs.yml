name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'

  # Allow manual trigger (e.g. to force a redeploy without changing docs)
  workflow_dispatch:

# Only one Pages deployment runs at a time; in-flight deployments are not cancelled
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read   # checkout only
  pages: write     # upload pages artifact
  id-token: write  # OIDC token for trusted deployment (no PAT needed)

jobs:
  # ── Job 1: Build the Docusaurus site ────────────────────────────────────────
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        env:
          NODE_ENV: production
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  # ── Job 2: Deploy the artifact to GitHub Pages ───────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
